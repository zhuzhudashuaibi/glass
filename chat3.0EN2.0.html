<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dynamic Island</title>
<link rel="stylesheet" href="chat3.0.css">
<link rel="stylesheet" href="./LGGC-liquid-glass-main/dist/lggc.css" /> 
<style>
    body {
    margin: 0;
    height: 100vh;
    background-color: #f1f1f1;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    vertical-align: middle;
    -webkit-tap-highlight-color: transparent;
}
p{
    line-height: 5%;
    text-align: center;
    color: #00000000;
    
    font-size: 80%;
    border: 0.1rem solid rgba(118, 118, 118, 0);

}
div {
    -webkit-tap-highlight-color: transparent;
    width: 9rem;
    height: 3rem;
    background-color: #000000;
    border-radius: 300px;
    border: 0.1rem solid rgb(118, 118, 118);
    position: relative;
    transition: all 0.5s cubic-bezier(0.68, -0.75, 0.265, 1.55);
    overflow: hidden;
    cursor: pointer;
    box-shadow:  41px 41px 82px #5a5a5a,
            -41px -41px 82px #ffffff;
    font-size: 2rem;
    color: #ffffff00;
    text-align-last: right;
    vertical-align: middle;
    line-height: 3rem;
    border-radius: 40000px;
    
}

div:hover {
    transform: scale(1.3);
    width: 13rem;
        transition: all 0.45s cubic-bezier(, 0, 0, 0);

    -webkit-tap-highlight-color： transparent;

｝

div:active {
    background-color: #ffffff;
    border: 0.05rem solid rgb(0, 0, 0);
    box-shadow:  41px 41px 82px #ffffff,
            -41px -41px 82px #ffffff;
    transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 5);

    
}


</style>
</head>
<body>

<div class="lggc">
    <p>sb</p>
    
</div>

</body>
<script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
<script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</html>
