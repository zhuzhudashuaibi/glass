<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dynamic Island</title>
<link rel="stylesheet" href="chat3.0.css">
<style>
    body {
    margin: 0;
    height: 100vh;
    background-color: #ffffff;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    vertical-align: middle;
}
p{
    line-height: 5%;
    text-align: center;
    color: #000000;
    
    font-size: 80%;

}
.dynamic-island {
    width: 9rem;
    height: 3rem;
    background-color: #000000;
    border-radius: 300px;
    border: 0.1rem solid rgb(118, 118, 118);
    position: relative;
    transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    overflow: hidden;
    cursor: pointer;
    box-shadow:  41px 41px 82px #5a5a5a,
             -41px -41px 82px #ffffff;
    font-size: 2rem;
    color: #000000;
    text-align-last: right;
    vertical-align: middle;
    line-height: 3rem;
    border-radius: 40000px;
}

.dynamic-island:hover {
    transform: scale(1.3);
    width: 12rem;
        transition: all 0.5s cubic-bezier(5, -0.55, 5, 1.55);

    border: 0.1rem solid rgb(118, 118, 118);
    
}
/*
.dynamic-island:active {
    background-color: #ffffff;
    border: 0.05rem solid rgb(0, 0, 0);
    box-shadow:  41px 41px 82px #ffffff,
             -41px -41px 82px #ffffff;
    transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);

</style>
</head>
<body>

<div class="dynamic-island">
    <p>sb</p>
    
</div>

</body>

</html>
